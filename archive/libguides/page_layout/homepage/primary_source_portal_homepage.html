<body class="s-lib-public-body">
	{{skip_link}}
	{{obsolete_browser_alert}}
	<!-- BEGIN: Page Header -->
	{{public_header}}
	<!-- END: Page Header -->
	<!-- BEGIN: Content Header -->
	<div id="s-lib-public-header" class="s-lib-header container s-lib-side-borders">
		<nav id="s-lib-bc" aria-label="breadcrumb">
			{{breadcrumbs}}
		</nav>
		<h1 id="s-lib-public-header-title">{{title}}
</h1>
		<div id="s-lib-public-header-desc">{{system_intro}}
</div>
	</div>
	<!-- END: Content Header -->

	<!-- BEGIN: content -->
	<div id="s-lib-public-main" class="s-lib-main container s-lib-side-borders" tabindex="-1">
		<div id="s-lg-index-cols" class="row">
			<!-- BEGIN: Left sidebar - Filtering and Search Tools -->
			<div id="col1" class="col-md-4 center">
				<div id="filter-search-container">


				
</div>
			</div>
			<!-- END: Left sidebar - Filtering and Search Tools -->
			<!-- BEGIN: Guide List -->
			<script>
				$( document ).ready(function() {
var pageURL = $(location).attr("href");
            var querystring = pageURL.split('?')[1];

					$( "#guide-list-container" ).load( "https://6jcjjj7vx5.execute-api.us-west-2.amazonaws.com/portal_filtered_results?"+querystring);
  						$("#filter-search-container").load("https://6jcjjj7vx5.execute-api.us-west-2.amazonaws.com/portal_filter_opts?"+querystring);


				});
			</script>
			<div id="col2" class="col-md-8 center">
				<div id="guide-list-container">
					<i class="fa fa-refresh fa-spin"></i> Loading...
				</div>
			</div>
			<!-- END: Guide List -->
		</div>
	</div>
	<!-- END: content -->
	<!-- BEGIN: Page Footer -->
	{{system_footer}}
	<!-- END: Page Footer -->
	<div id="s-lib-alert" title=""><div id="s-lib-alert-content"></div></div>	<!-- popover.twig -->
<div id="s-lib-popover-title" class="hide">
	<span class="text-info">
		<strong>title</strong>
	</span>

	<button type="button" id="popclose" class="close" onclick="jQuery('.s-lib-popover').popover('hide')">
		&times;
	</button>
</div>

<div id="s-lib-popover-content" class="hide">
	<i class="fa fa-refresh fa-spin"></i> Loading...
	<button class="btn btn-default btn-sm popclose" type="button">Close</button>
</div>
<!-- !popover.twig -->
	<!-- scroll_top.twig -->
<div id="s-lib-scroll-top">
	<a href="javascript:void(0);" onclick="jQuery('body').focus();" title="Back to Top"
	   aria-label="Back to Top">
		<span class="fa-stack fa-lg" aria-hidden="true">
			<i class="fa fa-square-o fa-stack-2x"></i>
			<i class="fa fa-angle-double-up fa-stack-1x" style="position:relative; bottom:2px;"></i>
		</span>
	</a>
</div>
<!-- !scroll_top.twig -->
	<!-- BEGIN: Custom Footer -->
	{{public_footer}}
	<!-- END: Custom Footer -->
	</body>
